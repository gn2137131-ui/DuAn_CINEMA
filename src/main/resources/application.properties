spring.application.name=ticketsystem

# Load local secrets (không commit file application-local.properties)
spring.config.import=optional:classpath:application-local.properties

server.port=${PORT:8080}

# Kết nối MySQL (Hỗ trợ cả 2 định dạng biến môi trường của Railway)
spring.datasource.url=jdbc:mysql://${MYSQLHOST:${MYSQL_HOST:localhost}}:${MYSQLPORT:${MYSQL_PORT:3306}}/${MYSQLDATABASE:${MYSQL_DATABASE:cinema_db}}
spring.datasource.username=${MYSQLUSER:${MYSQL_USER:root}}
# Mật khẩu được định nghĩa trong application-local.properties hoặc Railway
spring.datasource.password=${MYSQLPASSWORD:${MYSQL_PASSWORD:${DB_PASSWORD:}}}

# Cấu hình Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# cloudinary
# Cấu hình thật nằm trong application-local.properties
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api_key=${CLOUDINARY_API_KEY:}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:}

# Cho phép Swagger UI hoạt động
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# =====================================================
# 🏦 SePay Payment Configuration
# =====================================================
# API Key từ SePay (Webhook Secret) - cấu hình thật nằm trong application-local.properties
sepay.api.key=${SEPAY_API_KEY:}

# Số tài khoản nhận tiền (VD: MBBank, VietcomBank, etc.)
sepay.api.account-number=${SEPAY_ACCOUNT_NUMBER:}

# Tên tài khoản (sẽ hiển thị trên QR code)
sepay.api.account-name=CINEMA

logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestResponseBodyMethodProcessor=DEBUG

# =====================================================
# 📧 Email (Gmail SMTP) Configuration
# =====================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
# Cấu hình thật nằm trong application-local.properties
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8

# =====================================================
# 🌐 CORS Configuration
# =====================================================
# Danh sách origin được phép (cách nhau bằng dấu phẩy). Thay đổi khi deploy production.
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# =====================================================
# 🔑 JWT Configuration
# =====================================================
# Fix #2: Secret không hardcode trong source — khai báo trong application-local.properties
# hoặc biến môi trường JWT_SECRET khi deploy production
jwt.secret=${JWT_SECRET:}
